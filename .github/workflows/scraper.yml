name: Daily Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beautifulSoupScraper

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: beautifulSoupScraper/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        run: echo '${{ secrets.GOOGLE_CLIENT_KEY }}' > client_key.json

      - name: Run scraper
        run: python scraper.py
